<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Claws{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="{{ url_for('index') }}">Claws</a>
        <div class="header-meta">数据源：claws-info.json</div>
      </div>
    </header>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
    <script defer src="{{ url_for('static', filename='lazy-images.js') }}"></script>
  </body>
</html>
